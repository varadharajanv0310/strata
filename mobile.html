<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#26221B" />
  <title>strata — mobile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Space+Grotesk:wght@400..700&family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="m-stage">
    <div class="phone-scale" id="phone-scale">
      <div class="phone">
        <div class="phone-screen">
          <div id="mroot">
            <div style="position:absolute;inset:0;display:grid;place-items:center;background:#F4F0E6;color:#5C564A;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.16em;">
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="width:8px;height:8px;background:#FF4D00;animation:plot 1s steps(2) infinite;"></span>
                PLOTTING&hellip;
              </div>
              <style>@keyframes plot{0%,100%{opacity:1}50%{opacity:.15}}</style>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main-mobile.jsx"></script>

  <script>
    (function () {
      const el = document.getElementById("phone-scale");
      const W = 428, H = 898; // phone outer incl. padding
      function fit() {
        const vw = window.innerWidth, vh = window.innerHeight;
        const s = Math.min((vw - 24) / W, (vh - 24) / H, 1.15);
        el.style.transform = "scale(" + s + ")";
      }
      window.addEventListener("resize", fit);
      fit();
    })();
  </script>
</body>
</html>
