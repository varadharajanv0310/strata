# Alembic config for the strata app/serving DB.
# The DB URL is injected in alembic/env.py from settings (DATABASE_URL), so the
# same migrations apply to SQLite locally and Postgres in production.
[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/..
path_separator = os
# url intentionally blank — env.py sets it from config

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
